<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #status {
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
      min-height: 1.5em;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 12px rgba(168, 218, 220, 0.5);
    }

    #reset {
      margin-top: 2rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #reset:hover { background: #c73652; }

    #score {
      display: flex;
      gap: 2rem;
      margin-top: 1.5rem;
      font-size: 0.95rem;
      color: #aaa;
    }

    #score span { font-weight: bold; color: #eee; }
  </style>
</head>
<body>
  <h1>TIC TAC TOE</h1>
  <div id="status">Player X's turn</div>
  <div id="board"></div>
  <button id="reset">New Game</button>
  <div id="score">
    <div>X wins: <span id="xWins">0</span></div>
    <div>Draws: <span id="draws">0</span></div>
    <div>O wins: <span id="oWins">0</span></div>
  </div>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8], // rows
      [0,3,6],[1,4,7],[2,5,8], // cols
      [0,4,8],[2,4,6]          // diags
    ];

    let board, current, gameOver, score;

    function init() {
      board = Array(9).fill('');
      current = 'X';
      gameOver = false;
      score = score || { X: 0, O: 0, D: 0 };
      render();
      setStatus("Player X's turn");
    }

    function render() {
      const boardEl = document.getElementById('board');
      boardEl.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (val ? ` ${val.toLowerCase()} taken` : '');
        cell.textContent = val;
        cell.addEventListener('click', () => move(i));
        boardEl.appendChild(cell);
      });
      document.getElementById('xWins').textContent = score.X;
      document.getElementById('oWins').textContent = score.O;
      document.getElementById('draws').textContent = score.D;
    }

    function move(i) {
      if (gameOver || board[i]) return;
      board[i] = current;
      render();

      const win = checkWin();
      if (win) {
        highlight(win);
        setStatus(`Player ${current} wins!`);
        score[current]++;
        document.getElementById(current === 'X' ? 'xWins' : 'oWins').textContent = score[current];
        gameOver = true;
      } else if (board.every(Boolean)) {
        setStatus("It's a draw!");
        score.D++;
        document.getElementById('draws').textContent = score.D;
        gameOver = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        setStatus(`Player ${current}'s turn`);
      }
    }

    function checkWin() {
      return WINS.find(([a, b, c]) =>
        board[a] && board[a] === board[b] && board[b] === board[c]
      ) || null;
    }

    function highlight(indices) {
      const cells = document.querySelectorAll('.cell');
      indices.forEach(i => cells[i].classList.add('win'));
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    document.getElementById('reset').addEventListener('click', init);
    init();
  </script>
</body>
</html>
