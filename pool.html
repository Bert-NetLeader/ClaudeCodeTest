<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eight-Ball Pool</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0c0c0c;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  user-select: none;
}
canvas { display: block; cursor: crosshair; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ─── 1. CONSTANTS ─────────────────────────────────────────────────────────────
const W = 900, H = 560;
const TX = 40, TY = 52, TW = 820, TH = 440;   // table wood outer bounds
const RAIL = 36;
const PX = TX + RAIL, PY = TY + RAIL;           // PX=76, PY=88
const PW = TW - RAIL * 2, PH = TH - RAIL * 2;  // PW=748, PH=368

const R         = 12;     // ball radius
const FRICTION  = 0.987;  // per-frame velocity multiplier
const MIN_SPEED = 0.07;   // stop threshold
const POCKET_R  = 22;     // pocket detection radius
const MAX_POWER = 20;     // max shot power

const POCKETS = [
  { x: PX,          y: PY      },  // top-left
  { x: PX + PW / 2, y: PY      },  // top-mid
  { x: PX + PW,     y: PY      },  // top-right
  { x: PX,          y: PY + PH },  // bot-left
  { x: PX + PW / 2, y: PY + PH },  // bot-mid
  { x: PX + PW,     y: PY + PH },  // bot-right
];

const COLORS = [
  '#f8f8f8',  // 0  cue white
  '#f4d800',  // 1  yellow
  '#1133dd',  // 2  blue
  '#dd1100',  // 3  red
  '#880099',  // 4  purple
  '#ff6600',  // 5  orange
  '#007733',  // 6  dark green
  '#882200',  // 7  maroon
  '#111111',  // 8  black
  '#f4d800',  // 9  yellow stripe
  '#1133dd',  // 10 blue stripe
  '#dd1100',  // 11 red stripe
  '#880099',  // 12 purple stripe
  '#ff6600',  // 13 orange stripe
  '#007733',  // 14 green stripe
  '#882200',  // 15 maroon stripe
];

// ─── 2. CANVAS SETUP ──────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
canvas.width = W;
canvas.height = H;
const ctx = canvas.getContext('2d');

// ─── 3. BALL CLASS ────────────────────────────────────────────────────────────
class Ball {
  constructor(num, x, y) {
    this.num      = num;
    this.x        = x;
    this.y        = y;
    this.vx       = 0;
    this.vy       = 0;
    this.pocketed = false;
    this.type     = num === 0 ? 'cue' : num === 8 ? 'eight' : num <= 7 ? 'solid' : 'stripe';
  }

  get speed()  { return Math.hypot(this.vx, this.vy); }
  get moving() { return !this.pocketed && this.speed > MIN_SPEED; }

  applyFriction() {
    this.vx *= FRICTION;
    this.vy *= FRICTION;
    if (this.speed < MIN_SPEED) { this.vx = 0; this.vy = 0; }
  }

  wallBounce() {
    const E = 0.75; // restitution
    if (this.x - R < PX)      { this.x = PX + R;      this.vx =  Math.abs(this.vx) * E; }
    if (this.x + R > PX + PW) { this.x = PX + PW - R; this.vx = -Math.abs(this.vx) * E; }
    if (this.y - R < PY)      { this.y = PY + R;      this.vy =  Math.abs(this.vy) * E; }
    if (this.y + R > PY + PH) { this.y = PY + PH - R; this.vy = -Math.abs(this.vy) * E; }
  }

  draw() {
    if (this.pocketed) return;

    // Body + shadow
    ctx.save();
    ctx.shadowColor    = 'rgba(0,0,0,0.55)';
    ctx.shadowBlur     = 10;
    ctx.shadowOffsetX  = 2;
    ctx.shadowOffsetY  = 3;

    if (this.type === 'stripe') {
      ctx.beginPath();
      ctx.arc(this.x, this.y, R, 0, Math.PI * 2);
      ctx.fillStyle = '#f8f8f8';
      ctx.fill();
      ctx.restore();
      // Colored stripe band (clipped to ball circle)
      ctx.save();
      ctx.beginPath();
      ctx.arc(this.x, this.y, R, 0, Math.PI * 2);
      ctx.clip();
      ctx.fillStyle = COLORS[this.num];
      ctx.fillRect(this.x - R, this.y - R * 0.46, R * 2, R * 0.92);
      ctx.restore();
    } else {
      ctx.beginPath();
      ctx.arc(this.x, this.y, R, 0, Math.PI * 2);
      ctx.fillStyle = COLORS[this.num];
      ctx.fill();
      ctx.restore();
    }

    // Outline
    ctx.beginPath();
    ctx.arc(this.x, this.y, R, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(0,0,0,0.22)';
    ctx.lineWidth   = 0.8;
    ctx.stroke();

    // Number circle
    if (this.num !== 0) {
      const cR = R * 0.43;
      ctx.beginPath();
      ctx.arc(this.x, this.y, cR, 0, Math.PI * 2);
      ctx.fillStyle = this.type === 'stripe' ? COLORS[this.num] : 'rgba(255,255,255,0.92)';
      ctx.fill();
      ctx.font          = `bold ${this.num >= 10 ? R * 0.52 : R * 0.63}px Arial`;
      ctx.textAlign     = 'center';
      ctx.textBaseline  = 'middle';
      ctx.fillStyle     = (this.num === 8 || this.type === 'stripe') ? '#fff' : '#111';
      ctx.fillText(String(this.num), this.x, this.y + 0.5);
    }

    // Specular highlight
    ctx.beginPath();
    ctx.arc(this.x - R * 0.28, this.y - R * 0.3, R * 0.22, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.38)';
    ctx.fill();
  }
}

// ─── 4. PHYSICS ───────────────────────────────────────────────────────────────
function ballBallCollide(a, b) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const d2 = dx * dx + dy * dy;
  const md = R * 2;
  if (d2 >= md * md || d2 < 1e-6) return;
  const dist = Math.sqrt(d2);
  const nx = dx / dist, ny = dy / dist;
  const sep = (md - dist) * 0.5;
  a.x -= nx * sep;  a.y -= ny * sep;
  b.x += nx * sep;  b.y += ny * sep;
  const rv = (b.vx - a.vx) * nx + (b.vy - a.vy) * ny;
  if (rv >= 0) return;
  a.vx += rv * nx;  a.vy += rv * ny;
  b.vx -= rv * nx;  b.vy -= rv * ny;
}

// ─── 5. GAME STATE ────────────────────────────────────────────────────────────
let balls, cueBall;
let currentPlayer, playerType, gameOver, winner;
let inBallInHand, breakShot;
let pocketedThisTurn = [];
let msg = '', msgTimer = 0;

// Rack: standard 8-ball triangle, 8 in center row, solid/stripe mix in back corners
const RACK_ROWS = [[1], [2, 9], [3, 8, 10], [4, 14, 13, 11], [12, 6, 15, 7, 5]];

function buildRack() {
  const apex = { x: PX + PW * 0.625, y: PY + PH / 2 };
  const dRow = R * Math.sqrt(3);
  return RACK_ROWS.flatMap((row, r) =>
    row.map((num, c) => new Ball(
      num,
      apex.x + r * dRow,
      apex.y + (c - (row.length - 1) / 2) * (R * 2 + 0.3)
    ))
  );
}

function initGame() {
  cueBall       = new Ball(0, PX + PW * 0.25, PY + PH / 2);
  balls         = [cueBall, ...buildRack()];
  currentPlayer = 0;
  playerType    = [null, null];
  gameOver      = false;
  winner        = -1;
  inBallInHand  = false;
  breakShot     = true;
  pocketedThisTurn = [];
  setMsg('Player 1 — break shot!  Drag away from cue ball to set power.', 300);
  isDragging = false;
  shootPower = 0;
  wasMoving  = false;
}

function setMsg(text, ticks = 220) {
  msg      = text;
  msgTimer = ticks;
}

function anyMoving() { return balls.some(b => b.moving); }

// ─── 6. POCKET DETECTION & RESOLVE ───────────────────────────────────────────
function checkPockets() {
  for (const b of balls) {
    if (b.pocketed) continue;
    for (const p of POCKETS) {
      if (Math.hypot(b.x - p.x, b.y - p.y) < POCKET_R) {
        b.pocketed = true;
        b.vx = 0; b.vy = 0;
        pocketedThisTurn.push(b);
        break;
      }
    }
  }
}

function resolveShot() {
  const potted   = pocketedThisTurn.slice();
  pocketedThisTurn = [];
  const cp = currentPlayer, op = 1 - cp;

  const cuePotted   = potted.some(b => b.num === 0);
  const eightPotted = potted.some(b => b.num === 8);
  const objBalls    = potted.filter(b => b.num !== 0 && b.num !== 8);

  // 8-ball pocketed
  if (eightPotted) {
    if (cuePotted) {
      endGame(op, `Scratch on 8-ball! Player ${op + 1} wins!`);
    } else {
      const myType  = playerType[cp];
      const cleared = myType !== null && !balls.some(b => !b.pocketed && b.type === myType);
      endGame(
        cleared ? cp : op,
        cleared ? `Player ${cp + 1} wins!` : `8-ball too early! Player ${op + 1} wins!`
      );
    }
    return;
  }

  // Scratch (cue ball pocketed)
  if (cuePotted) {
    cueBall.pocketed = false;
    cueBall.vx = 0; cueBall.vy = 0;
    cueBall.x  = PX + PW * 0.25;
    cueBall.y  = PY + PH / 2;
    inBallInHand  = true;
    breakShot     = false;
    currentPlayer = op;
    setMsg(`Scratch! Ball in hand — Player ${op + 1}'s turn`, 320);
    return;
  }

  // Type assignment: first post-break object ball potted determines solid/stripe
  if (!breakShot && playerType[0] === null && objBalls.length > 0) {
    const t = objBalls[0].type;
    playerType[cp] = t;
    playerType[op] = t === 'solid' ? 'stripe' : 'solid';
    setMsg(`Player ${cp + 1} = ${t}s  ·  Player ${op + 1} = ${playerType[op]}s`, 320);
  }
  breakShot = false;

  // Turn logic: if player potted at least one of their assigned balls, they stay
  const myType    = playerType[cp];
  const scoredOwn = objBalls.length > 0 &&
    objBalls.some(b => myType === null || b.type === myType);

  if (scoredOwn) {
    const rem = myType ? balls.filter(b => !b.pocketed && b.type === myType).length : -1;
    setMsg(rem === 0
      ? `Player ${cp + 1} — pot the 8-ball to win!`
      : `Player ${cp + 1} — keep shooting!`, 200);
  } else {
    currentPlayer = op;
    const rem = playerType[op]
      ? balls.filter(b => !b.pocketed && b.type === playerType[op]).length : -1;
    setMsg(rem === 0
      ? `Player ${op + 1} — pot the 8-ball to win!`
      : `Player ${op + 1}'s turn`, 220);
  }
}

function endGame(p, text) {
  gameOver = true;
  winner   = p;
  setMsg(text + '   Press R to restart.', 1e9);
}

// ─── 7. INPUT ─────────────────────────────────────────────────────────────────
let isDragging = false;
let aimAngle = 0, shootPower = 0;
let dragStartX = 0, dragStartY = 0;
let mouseX = W / 2, mouseY = H / 2;
let wasMoving = false;

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = (e.clientX - r.left) * (W / r.width);
  mouseY = (e.clientY - r.top)  * (H / r.height);
  if (isDragging && !inBallInHand) {
    const dist = Math.hypot(mouseX - dragStartX, mouseY - dragStartY);
    shootPower = Math.min(dist / 6, MAX_POWER);
  }
});

canvas.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  if (gameOver || anyMoving()) return;
  const r  = canvas.getBoundingClientRect();
  const mx = (e.clientX - r.left) * (W / r.width);
  const my = (e.clientY - r.top)  * (H / r.height);

  if (inBallInHand) {
    const inside = mx > PX + R && mx < PX + PW - R && my > PY + R && my < PY + PH - R;
    if (!inside) return;
    const blocked = balls.some(b =>
      b.num !== 0 && !b.pocketed && Math.hypot(b.x - mx, b.y - my) < R * 2.2
    );
    if (!blocked) {
      cueBall.x = mx; cueBall.y = my;
      inBallInHand = false;
      setMsg(`Player ${currentPlayer + 1} — shoot!`, 120);
    }
    return;
  }

  // Lock aim angle from click position relative to cue ball
  aimAngle   = Math.atan2(my - cueBall.y, mx - cueBall.x);
  dragStartX = mx;
  dragStartY = my;
  isDragging = true;
  shootPower = 0;
});

canvas.addEventListener('mouseup', e => {
  if (e.button !== 0) return;
  if (!isDragging) return;
  isDragging = false;
  if (gameOver || anyMoving() || inBallInHand) return;
  if (shootPower >= 0.5) {
    cueBall.vx = Math.cos(aimAngle) * shootPower;
    cueBall.vy = Math.sin(aimAngle) * shootPower;
    pocketedThisTurn = [];
  }
  shootPower = 0;
});

document.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') initGame();
});

// ─── 8. DRAW: TABLE ───────────────────────────────────────────────────────────
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);      ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawTable() {
  // Outer wood frame
  const wg = ctx.createLinearGradient(TX, TY, TX + TW, TY + TH);
  wg.addColorStop(0,   '#6b3c18');
  wg.addColorStop(0.5, '#8a5225');
  wg.addColorStop(1,   '#4a2808');
  ctx.fillStyle = wg;
  roundRect(TX, TY, TW, TH, 10);
  ctx.fill();

  // Wood grain
  ctx.save();
  roundRect(TX, TY, TW, TH, 10);
  ctx.clip();
  ctx.strokeStyle = 'rgba(0,0,0,0.10)';
  ctx.lineWidth   = 1;
  for (let i = 1; i < 20; i++) {
    ctx.beginPath();
    ctx.moveTo(TX + i * (TW / 20), TY);
    ctx.lineTo(TX + i * (TW / 20), TY + TH);
    ctx.stroke();
  }
  ctx.restore();

  // Cushion rubber
  ctx.fillStyle = '#0d5e08';
  ctx.fillRect(TX + 12, TY + 12, TW - 24, TH - 24);

  // Felt surface (subtle radial gradient)
  const fg = ctx.createRadialGradient(
    PX + PW / 2, PY + PH / 2, 20,
    PX + PW / 2, PY + PH / 2, PH * 0.85
  );
  fg.addColorStop(0, '#2e7e2a');
  fg.addColorStop(1, '#1b5518');
  ctx.fillStyle = fg;
  ctx.fillRect(PX, PY, PW, PH);

  // Spots
  const spots = [
    { x: PX + PW / 2,       y: PY + PH / 2 },  // center
    { x: PX + PW * 0.625,   y: PY + PH / 2 },  // foot (rack apex)
    { x: PX + PW * 0.25,    y: PY + PH / 2 },  // head (cue ball)
  ];
  spots.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fill();
  });

  // Head string (dashed)
  ctx.beginPath();
  ctx.moveTo(PX + PW * 0.25, PY);
  ctx.lineTo(PX + PW * 0.25, PY + PH);
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth   = 1;
  ctx.setLineDash([4, 10]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Pocket holes
  for (const p of POCKETS) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, POCKET_R, 0, Math.PI * 2);
    ctx.fillStyle = '#000';
    ctx.fill();
    ctx.strokeStyle = '#2a1000';
    ctx.lineWidth   = 4;
    ctx.stroke();
  }
}

// ─── 9. DRAW: CUE STICK ───────────────────────────────────────────────────────
function drawCue() {
  if (gameOver || anyMoving() || inBallInHand) return;

  const angle    = isDragging
    ? aimAngle
    : Math.atan2(mouseY - cueBall.y, mouseX - cueBall.x);
  const pullback = isDragging ? Math.min(shootPower * 2.8, 65) : 0;

  // Dotted aim line
  ctx.save();
  ctx.setLineDash([5, 8]);
  ctx.beginPath();
  ctx.moveTo(
    cueBall.x + Math.cos(angle) * (R + 2),
    cueBall.y + Math.sin(angle) * (R + 2)
  );
  ctx.lineTo(
    cueBall.x + Math.cos(angle) * 340,
    cueBall.y + Math.sin(angle) * 340
  );
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth   = 1;
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // Cue drawn from cue ball outward in OPPOSITE direction (angle + PI)
  ctx.save();
  ctx.translate(cueBall.x, cueBall.y);
  ctx.rotate(angle + Math.PI);

  const tip  = R + 5 + pullback;
  const butt = tip + 200;

  // Shaft
  const sg = ctx.createLinearGradient(tip, -4, butt, 4);
  sg.addColorStop(0,   '#dfc070');
  sg.addColorStop(0.5, '#a07030');
  sg.addColorStop(1,   '#5c2c0c');
  ctx.beginPath();
  ctx.moveTo(tip, 0);
  ctx.lineTo(butt, 0);
  ctx.strokeStyle = sg;
  ctx.lineWidth   = 8;
  ctx.lineCap     = 'round';
  ctx.stroke();

  // Wrap ring
  ctx.beginPath();
  ctx.moveTo(tip + 100, 0);
  ctx.lineTo(tip + 112, 0);
  ctx.strokeStyle = '#eeeecc';
  ctx.lineWidth   = 11;
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(tip + 101, 0);
  ctx.lineTo(tip + 111, 0);
  ctx.strokeStyle = '#5a3a10';
  ctx.lineWidth   = 9;
  ctx.stroke();

  // Chalk tip
  ctx.beginPath();
  ctx.arc(tip, 0, 4, 0, Math.PI * 2);
  ctx.fillStyle = '#4466dd';
  ctx.fill();

  ctx.restore();
}

// ─── 10. DRAW: POWER BAR ──────────────────────────────────────────────────────
function drawPowerBar() {
  if (!isDragging || anyMoving() || gameOver) return;
  const bx = TX + TW + 8, by = PY, bw = 16, bh = PH;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(bx, by, bw, bh);
  const pct = shootPower / MAX_POWER;
  const fh  = pct * bh;
  const g   = ctx.createLinearGradient(0, by + bh, 0, by + bh - fh);
  g.addColorStop(0,   '#00dd00');
  g.addColorStop(0.6, '#ffcc00');
  g.addColorStop(1,   '#ff2200');
  ctx.fillStyle = g;
  ctx.fillRect(bx, by + bh - fh, bw, fh);
  ctx.strokeStyle = '#555';
  ctx.lineWidth   = 1;
  ctx.strokeRect(bx, by, bw, bh);
  ctx.fillStyle   = '#aaa';
  ctx.font        = '9px Courier New';
  ctx.textAlign   = 'center';
  ctx.fillText('PWR', bx + bw / 2, by - 5);
}

// ─── 11. DRAW: BALL-IN-HAND CURSOR ────────────────────────────────────────────
function drawBIHCursor() {
  if (!inBallInHand || anyMoving()) return;
  ctx.save();
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.arc(mouseX, mouseY, R, 0, Math.PI * 2);
  ctx.fillStyle = '#f8f8f8';
  ctx.fill();
  ctx.restore();
  ctx.beginPath();
  ctx.arc(mouseX, mouseY, R, 0, Math.PI * 2);
  ctx.strokeStyle = '#44aaff';
  ctx.lineWidth   = 2;
  ctx.stroke();
}

// ─── 12. DRAW: HUD ────────────────────────────────────────────────────────────
function drawHUD() {
  // Panel backgrounds
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, TY - 1);
  ctx.fillRect(0, TY + TH + 1, W, H - TY - TH - 1);

  // Player panels (left = P1, right = P2)
  for (let p = 0; p < 2; p++) {
    const active = currentPlayer === p && !gameOver && !anyMoving();
    const won    = gameOver && winner === p;
    const x      = p === 0 ? 18 : W - 18;
    const align  = p === 0 ? 'left' : 'right';
    ctx.textAlign = align;

    ctx.font      = `bold 15px 'Courier New'`;
    ctx.fillStyle = won ? '#44ff88' : active ? '#ffee44' : '#888';
    ctx.fillText(`Player ${p + 1}`, x, 20);

    if (playerType[p]) {
      const rem = balls.filter(b => !b.pocketed && b.type === playerType[p]).length;
      ctx.font      = '12px Courier New';
      ctx.fillStyle = active ? '#ddd' : '#666';
      ctx.fillText(`${playerType[p]}s — ${rem} left`, x, 36);
    } else {
      ctx.font      = '11px Courier New';
      ctx.fillStyle = '#444';
      ctx.fillText('unassigned', x, 36);
    }

    if (active) {
      ctx.fillStyle = '#ffee44';
      ctx.font      = '11px Courier New';
      ctx.fillText('▶ your turn', x, 50);
    }
    if (won) {
      ctx.fillStyle = '#44ff88';
      ctx.font      = 'bold 13px Courier New';
      ctx.fillText('★ WINNER! ★', x, 50);
    }
  }

  // Mini ball tray — 15 small balls centered at top
  drawBallTray();

  // Status message
  if (msg && msgTimer > 0) {
    const alpha = Math.min(msgTimer, 60) / 60;
    ctx.textAlign  = 'center';
    ctx.font       = 'bold 13px Courier New';
    ctx.fillStyle  = `rgba(255,255,210,${alpha})`;
    ctx.fillText(msg, W / 2, TY + TH + 20);
    if (msgTimer < 1e8) msgTimer--;
  }

  // Ball-in-hand prompt
  if (inBallInHand && !anyMoving()) {
    ctx.textAlign  = 'center';
    ctx.font       = 'bold 12px Courier New';
    ctx.fillStyle  = 'rgba(100,180,255,0.9)';
    ctx.fillText('BALL IN HAND — click inside the table to place cue ball', W / 2, TY + TH + 38);
  }

  // Controls hint
  ctx.textAlign  = 'center';
  ctx.font       = '10px Courier New';
  ctx.fillStyle  = '#333';
  ctx.fillText('Click & drag away from cue ball to set power  ·  Release to shoot  ·  R = restart', W / 2, H - 4);
}

function drawBallTray() {
  const bs      = 8;   // mini ball radius
  const gap     = 3;
  const totalW  = 15 * (bs * 2 + gap) - gap;
  const startX  = W / 2 - totalW / 2 + bs;
  const y       = 29;

  for (let n = 1; n <= 15; n++) {
    const ball = balls.find(b => b.num === n);
    const bx   = startX + (n - 1) * (bs * 2 + gap);

    ctx.beginPath();
    ctx.arc(bx, y, bs, 0, Math.PI * 2);
    if (ball.pocketed) {
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      ctx.fill();
    } else {
      if (ball.type === 'stripe') {
        ctx.fillStyle = '#f0f0f0';
        ctx.fill();
        ctx.save();
        ctx.beginPath();
        ctx.arc(bx, y, bs, 0, Math.PI * 2);
        ctx.clip();
        ctx.fillStyle = COLORS[n];
        ctx.fillRect(bx - bs, y - bs * 0.44, bs * 2, bs * 0.88);
        ctx.restore();
      } else {
        ctx.fillStyle = COLORS[n];
        ctx.fill();
      }
      ctx.strokeStyle = 'rgba(255,255,255,0.22)';
      ctx.lineWidth   = 0.8;
      ctx.stroke();
    }
  }
}

// ─── 13. DRAW: GAME OVER OVERLAY ──────────────────────────────────────────────
function drawGameOverOverlay() {
  if (!gameOver) return;
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(PX, PY, PW, PH);
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.font         = `bold 42px 'Courier New'`;
  ctx.fillStyle    = '#44ff88';
  ctx.fillText(`Player ${winner + 1} Wins!`, W / 2, PY + PH / 2 - 20);
  ctx.font      = '18px Courier New';
  ctx.fillStyle = '#ccc';
  ctx.fillText('Press R to restart', W / 2, PY + PH / 2 + 30);
  ctx.textBaseline = 'alphabetic';
}

// ─── 14. GAME LOOP ────────────────────────────────────────────────────────────
function update() {
  if (gameOver) return;
  const moving = anyMoving();
  if (!moving && wasMoving) resolveShot();
  wasMoving = moving;
  if (!moving) return;

  // Step 1: move all balls + friction
  for (const b of balls) {
    if (b.pocketed) continue;
    b.x += b.vx;
    b.y += b.vy;
    b.applyFriction();
  }

  // Step 2: pocket check BEFORE wall bounce (lets corner-bound balls sink)
  checkPockets();

  // Step 3: wall bounce (non-pocketed only)
  for (const b of balls) {
    if (!b.pocketed) b.wallBounce();
  }

  // Step 4: ball-ball elastic collisions
  for (let i = 0; i < balls.length; i++) {
    if (balls[i].pocketed) continue;
    for (let j = i + 1; j < balls.length; j++) {
      if (balls[j].pocketed) continue;
      ballBallCollide(balls[i], balls[j]);
    }
  }
}

function draw() {
  ctx.fillStyle = '#0c0c0c';
  ctx.fillRect(0, 0, W, H);
  drawTable();
  for (const b of balls) b.draw();
  drawCue();
  drawPowerBar();
  drawBIHCursor();
  drawGameOverOverlay();
  drawHUD();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ─── 15. BOOTSTRAP ────────────────────────────────────────────────────────────
initGame();
loop();
</script>
